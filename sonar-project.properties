# SonarCloud — single project for the whole monorepo (backend + frontend).
sonar.projectKey=ivopogace_riviera-sunbed-booking
sonar.organization=swap-shop

# Production sources for both modules.
sonar.sources=platform/src/main/java,frontend/src

# Backend (Java): compiled classes + JaCoCo XML (both downloaded as a CI artifact).
sonar.java.binaries=platform/build/classes/java/main
sonar.coverage.jacoco.xmlReportPaths=platform/build/reports/jacoco/test/jacocoTestReport.xml

# Frontend (TS/JS): Vitest lcov (downloaded as a CI artifact; SF paths are normalized
# to repo-root in CI so coverage maps under this single project).
sonar.javascript.lcov.reportPaths=frontend/coverage/frontend/lcov.info

sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**,**/build/**,**/coverage/**
