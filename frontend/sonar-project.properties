# SonarCloud — frontend (Angular / Vitest).
# Maintainer: confirm/adjust projectKey + organization to match the SonarCloud project.
sonar.projectKey=ivopogace_riviera-sunbed-booking-frontend
sonar.organization=ivopogace

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Coverage produced by `npm run test:coverage` (Vitest v8 → lcov, nested under the project name).
sonar.javascript.lcov.reportPaths=coverage/frontend/lcov.info

sonar.exclusions=**/node_modules/**,dist/**,coverage/**
