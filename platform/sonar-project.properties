# SonarCloud — backend (Spring Boot / Gradle).
# Maintainer: confirm/adjust projectKey + organization to match the SonarCloud project.
sonar.projectKey=ivopogace_riviera-sunbed-booking-backend
sonar.organization=ivopogace

sonar.sources=src/main/java
sonar.tests=src/test/java

# Compiled classes produced by `./gradlew build` (required by the Sonar Java analyzer).
sonar.java.binaries=build/classes/java/main
sonar.java.test.binaries=build/classes/java/test

# Coverage produced by `./gradlew jacocoTestReport` (XML report).
sonar.coverage.jacoco.xmlReportPaths=build/reports/jacoco/test/jacocoTestReport.xml
