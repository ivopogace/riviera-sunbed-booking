spring.application.name=platform

# Bind the port the platform host injects ($PORT on Render); default for local runs.
server.port=${PORT:8080}

# Origins allowed to call the API from a browser (the deployed Angular frontend).
# Comma-separated; override per environment via APP_WEB_CORS_ALLOWED_ORIGINS.
# Non-prod default: this project's GitHub Pages origin.
app.web.cors.allowed-origins=https://ivopogace.github.io

# Datasource (SPRING_DATASOURCE_URL / _USERNAME / _PASSWORD) is supplied entirely by
# the environment in every deployed target — never committed. Locally, the
# spring-boot-docker-compose dev dependency starts Postgres from compose.yaml.

# Stripe credentials — supplied by the environment, NEVER committed (invariant #8 / AC-9).
# Empty by default: the default profile runs the in-process stub gateway (no Stripe). Real
# collection runs under the `stripe` profile, which needs both set. The webhook secret
# (whsec_...) verifies inbound webhook signatures.
stripe.api-key=${STRIPE_API_KEY:}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}

# Operator credential for the venue write API (U7: POST/PATCH/DELETE /api/venues**, role
# OPERATOR). The real staff/admin identity model is deferred; for now a single httpBasic
# operator gates every write. Username/role are fixed here; the PASSWORD is NEVER committed —
# supply it per environment via SPRING_SECURITY_USER_PASSWORD. When unset (local dev), Spring
# Boot generates a random password and logs it at startup. Tests set their own password.
spring.security.user.name=operator
spring.security.user.roles=OPERATOR

# Spring Modulith Event Publication Registry (U4 async payment->booking confirmation).
# ARCHIVE: completed publications move to event_publication_archive (live table stays small,
# history retained). Incomplete publications are re-submitted on restart so a transient listener
# failure self-heals without manual intervention. The registry schema is owned by Flyway (V8),
# not auto-initialized (invariant #12).
spring.modulith.events.completion-mode=archive
spring.modulith.events.republish-outstanding-events-on-restart=true
