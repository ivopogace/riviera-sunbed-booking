name: CI

on:
  push:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (a PR branch fires both push + pull_request).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle (cached)
        uses: gradle/actions/setup-gradle@v6

      - name: Build and test
        run: ./gradlew build jacocoTestReport --no-daemon

      - name: Upload backend coverage + classes (for Sonar)
        uses: actions/upload-artifact@v7
        with:
          name: backend-sonar
          path: |
            platform/build/reports/jacoco/test/jacocoTestReport.xml
            platform/build/classes/java/main
          if-no-files-found: error
          retention-days: 1

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node (from .nvmrc)
        uses: actions/setup-node@v6
        with:
          # .nvmrc lives at the REPO ROOT. `uses:` steps resolve paths from the repo
          # root, not the job's `working-directory: frontend`, so this is correct —
          # do NOT change it to `frontend/.nvmrc` or add one there.
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (hard gate)
        run: npm run lint

      - name: Test (Vitest, once, with coverage)
        run: npm run test:coverage

      - name: Install Playwright Chromium (for the a11y e2e)
        run: npx playwright install --with-deps chromium

      - name: A11y e2e (real-render axe over the booking flow)
        # The API-mocked a11y suite — no backend needed. The real-backend U7 editor suite
        # (`npm run test:e2e`) boots Spring Boot + Postgres and is intentionally NOT run here
        # (this job has no JDK/Docker); see frontend/playwright.config.ts.
        run: npm run test:e2e:a11y

      - name: Build (production)
        run: npm run build

      - name: Upload frontend coverage (for Sonar)
        uses: actions/upload-artifact@v7
        with:
          name: frontend-sonar
          path: frontend/coverage/frontend/lcov.info
          if-no-files-found: error
          retention-days: 1

  sonar:
    name: SonarCloud scan
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    # One combined scan for the single SonarCloud project. SONAR_TOKEN is configured,
    # so the scan runs and reports the quality gate on every PR. The `SONAR_TOKEN != ''`
    # guards on the steps below are a safety fallback that keeps the job green on
    # secret-less runs (e.g. forks), not a "skipped by default" state.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history for accurate Sonar new-code / blame

      - name: Download backend coverage + classes
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/download-artifact@v8
        with:
          name: backend-sonar
          path: platform/build

      - name: Download frontend coverage
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: actions/download-artifact@v8
        with:
          name: frontend-sonar
          path: frontend/coverage/frontend

      - name: Normalize frontend lcov paths to repo root
        if: ${{ env.SONAR_TOKEN != '' }}
        run: sed -i 's#^SF:src/#SF:frontend/src/#' frontend/coverage/frontend/lcov.info

      - name: SonarCloud scan (backend + frontend, single project)
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
