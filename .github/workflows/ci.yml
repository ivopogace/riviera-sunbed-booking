name: CI

on:
  push:
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (a PR branch fires both push + pull_request).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    # Exposed so the Sonar step can gate itself on the secret being present.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    defaults:
      run:
        working-directory: platform
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Set up Gradle (cached)
        uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew build jacocoTestReport --no-daemon

      # Skipped (pipeline stays green) until the maintainer adds the SONAR_TOKEN secret.
      - name: SonarCloud scan (backend)
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          projectBaseDir: platform
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    # Exposed so the Sonar step can gate itself on the secret being present.
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node (from .nvmrc)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (hard gate)
        run: npm run lint

      - name: Test (Vitest, once, with coverage)
        run: npm run test:coverage

      - name: Build (production)
        run: npm run build

      # Skipped (pipeline stays green) until the maintainer adds the SONAR_TOKEN secret.
      - name: SonarCloud scan (frontend)
        if: ${{ env.SONAR_TOKEN != '' }}
        uses: SonarSource/sonarqube-scan-action@v4
        with:
          projectBaseDir: frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
